<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Echos</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables & Theme Setup */
        :root {
            /* Light Theme Palette */
            --primary-color: #a23271;
            --tape-color: #c9ce3f;
            --tape-shadow: rgba(0,0,0,0.15);
            --grid-bg: #fffefa;
            --grid-line: #efdfa6;
            --footer-bg: #bacb3a;
            
            --text-main: #1c1c1c;
            --text-muted: #555555;
            --text-light: #ffffff;
            
            --card-bg: #ffffff;
            --card-shadow: rgba(0, 0, 0, 0.05) 0px 4px 15px;

            --note-blue: #b2d5d8;
            --note-yellow: #eadb8d;
            --note-pink: #eb5e88;
            
            --progress-bg: #f8f8f8;
            --progress-fill: #b5c73d;
            
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            
            --border-color: #dcdcdc;
            --search-bg: #eadb8d;
            
            --hero-bg-img: url("data:image/svg+xml,%3Csvg width='450' height='70' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='0' y='50' font-family='Arial Black, sans-serif' font-size='50' font-weight='900' letter-spacing='-1'%3E%3Ctspan fill='%23ef4d31'%3ECAREER%3C/tspan%3E%3Ctspan fill='%238a205a'%3EECHOS%3C/tspan%3E%3C/text%3E%3C/svg%3E");
            --header-border: #111;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary-color: #1a0812;
                --tape-color: #8c9022;
                --tape-shadow: rgba(0,0,0,0.5);
                --grid-bg: #1e1e1a;
                --grid-line: #3a382c;
                --footer-bg: #191c01;
                
                --text-main: #e8e8e8;
                --text-muted: #a0a0a0;
                --card-bg: #2a2a2a;
                --card-shadow: rgba(0, 0, 0, 0.4) 0px 4px 15px;

                --note-blue: #2c4442;
                --note-yellow: #464024;
                --note-pink: #521929;
                
                --progress-bg: #404040;
                --progress-fill: #8a9c24;
                --border-color: #404040;
                --search-bg: #2d2b1f;

                --hero-bg-img: url("data:image/svg+xml,%3Csvg width='450' height='70' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='0' y='50' font-family='Arial Black, sans-serif' font-size='50' font-weight='900' letter-spacing='-1'%3E%3Ctspan fill='%2342150d'%3ECAREER%3C/tspan%3E%3Ctspan fill='%232e0a1b'%3EECHOS%3C/tspan%3E%3C/text%3E%3C/svg%3E");
                --header-border: #eee;
            }
        }

        /* Base Resets */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font-body); 
            color: var(--text-main); 
            background-color: var(--grid-bg); 
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* Typography */
        h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 700; color: var(--text-main); }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); line-height: 1.1; margin-bottom: 1rem; font-weight: 600; }
        p { line-height: 1.5; }

        /* Layout Utility */
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        /* HERO SECTION */
        .hero-section {
            background-color: var(--primary-color);
            background-image: var(--hero-bg-img);
            background-repeat: repeat;
            position: relative;
            padding: clamp(3rem, 10vw, 5rem) 1rem;
            display: flex; justify-content: center; align-items: center; text-align: center;
            min-height: 350px;
        }
        .hero-content {
            background: var(--card-bg);
            padding: clamp(2rem, 5vw, 3rem) clamp(2rem, 8vw, 4rem);
            position: relative; z-index: 1;
            max-width: 700px; margin: 0 1rem;
            box-shadow: var(--card-shadow);
            transform: rotate(-2deg);
            transition: background 0.3s;
        }
        .tape {
            position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%) rotate(1deg);
            width: 120px; height: 30px;
            background: var(--tape-color);
            box-shadow: 0 2px 4px var(--tape-shadow);
        }
        .hero-content p { font-size: clamp(1rem, 2vw, 1.2rem); color: var(--text-muted); font-weight: 500;}

        /* MAIN CONTENT AREA with GRID */
        .main-wrapper {
            background-color: var(--grid-bg);
            background-image: 
                linear-gradient(var(--grid-line) 1.5px, transparent 1.5px),
                linear-gradient(90deg, var(--grid-line) 1.5px, transparent 1.5px);
            background-size: 60px 60px;
            padding: 2rem 0 5rem 0;
            min-height: 80vh;
        }

        /* Top Bar */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap;
        }
        .search-bar {
            background: var(--search-bg); padding: 0.8rem 1rem; border: none;
            font-family: var(--font-body); font-weight: 600;
            width: 300px; max-width: 100%; color: var(--text-main); outline: none;
            border-bottom: 2px solid transparent; transition: border-bottom 0.2s;
        }
        .search-bar:focus { border-bottom: 2px solid var(--text-main); }
        .search-bar::placeholder { color: var(--text-muted); }
        
        .btn-share {
            background: var(--header-border); color: var(--card-bg);
            padding: 0.8rem 1.5rem; border: none; font-family: var(--font-body);
            font-weight: 600; cursor: pointer; font-size: 0.9rem; letter-spacing: 0.5px;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-share:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Tabs */
        .tabs-header {
            display: flex; align-items: stretch;
            margin-bottom: -1px;
            position: relative;
            z-index: 10;
        }
        .tabs-container {
            display: flex; overflow-x: auto; scrollbar-width: none; flex: 1;
            scroll-behavior: smooth;
        }
        .tabs-container.no-smooth { scroll-behavior: auto !important; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 1rem 1.2rem;
            font-family: var(--font-body); font-weight: 500; font-size: 0.85rem;
            cursor: pointer; white-space: nowrap; color: var(--text-main);
            text-transform: uppercase; transition: all 0.2s;
            border: 1px solid var(--border-color);
            margin-right: -1px;
            position: relative;
        }
        .tab.active { 
            background: var(--card-bg); 
            font-weight: 600; 
            border-bottom: 1px solid var(--card-bg);
            z-index: 2;
        }
        .tab:not(.active) { background: #f0ebd1; }
        .tab:hover:not(.active) { color: var(--text-main); background: #f0e6ae; }
        @media (prefers-color-scheme: dark) {
            .tab:not(.active) { background: #2d2b1f; color: var(--text-muted); }
            .tab:hover:not(.active) { background: rgba(255,255,255,0.05); }
        }
        .tab svg { width: 16px; height: 16px; flex-shrink: 0; }
        
        .tabs-arrow {
            display: flex; align-items: center; justify-content: center;
            padding: 0 1rem; background: var(--card-bg); 
            border: 1px solid var(--border-color);
            color: var(--text-main); cursor: pointer;
            margin-left: -1px;
            z-index: 1;
        }

        /* Tab Content */
        .tab-content {
            background: var(--card-bg); padding: clamp(2rem, 5vw, 4rem);
            box-shadow: var(--card-shadow); position: relative;
            min-height: 600px;
            border: 1px solid var(--border-color);
        }
        
        /* Sentiment Section */
        .content-header { margin-bottom: 2rem; }
        .content-header h2 { font-size: 2.2rem; margin-bottom: 0.5rem; font-weight: 400; }
        .content-header p { color: #888; font-size: 0.85rem; font-weight: 400;}

        .sentiment-bar-container { margin: 1.5rem 0 0.5rem 0; }
        .sentiment-bar {
            height: 20px; background: var(--progress-bg);
            border: 1px solid var(--text-main); width: 100%; margin-bottom: 0.8rem;
        }
        .sentiment-fill {
            height: 100%; background: var(--progress-fill); width: 0%; border-right: 1px solid var(--text-main);
            transition: width 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .sentiment-labels {
            display: flex; justify-content: space-between; font-size: 0.85rem; color: #888; font-weight: 400; font-family: var(--font-body);
        }
        .sentiment-labels strong { color: var(--text-main); font-family: var(--font-heading); font-style: normal; font-weight: 700; font-size: 1.1rem; }

        /* Word Cloud */
        .word-cloud { text-align: center; margin: 4rem 0; }
        .word-cloud h3, .experiences h3 {
            font-family: var(--font-body); color: #888;
            font-style: normal; font-size: 0.9rem; margin-bottom: 1.5rem; font-weight: 400;
        }
        .words { font-family: var(--font-heading); display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 1rem; max-width: 600px; margin: 0 auto; line-height: 1.2;}
        .word-lg { font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: 400; color: var(--text-main); }
        .word-md { font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 400; color: var(--text-main); }
        .word-sm { font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 400; color: var(--text-main); }

        /* Sticky Notes */
        .experiences { margin-top: 5rem; text-align: center; }
        .notes-container {
            display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin-top: 2rem;
        }
        .note {
            width: 250px; padding: 2rem 1.5rem; position: relative;
            box-shadow: rgba(0,0,0,0.1) 2px 5px 15px; color: #111; 
            transform: rotate(var(--rot, -2deg)); transition: transform 0.3s, z-index 0s;
            text-align: center;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        @media (prefers-color-scheme: dark) {
            .note { color: #f0f0f0; }
        }
        
        .note:hover { transform: scale(1.05) rotate(0deg); z-index: 10 !important; box-shadow: rgba(0,0,0,0.2) 5px 10px 25px;}
        .note-tape {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%) rotate(1deg);
            width: 50px; height: 25px; background: #1a1a1a; 
        }
        @media (prefers-color-scheme: dark) {
            .note-tape { background: #111; }
        }
        
        .note-blue { background: var(--note-blue); --rot: -3deg; z-index: 1; transform-origin: top center;}
        .note-yellow { background: var(--note-yellow); --rot: 2deg; z-index: 2; margin-top: 20px; transform-origin: top center;}
        .note-pink { background: var(--note-pink); --rot: -4deg; z-index: 1; margin-top: 10px; transform-origin: top center;}

        .note p {
            font-family: var(--font-heading); font-size: 1.15rem; font-style: normal;
            margin-bottom: 1.5rem; line-height: 1.4; font-weight: 400; flex-grow: 1; display:flex; align-items:center;
            padding-top: 1rem;
        }
        .note-meta { font-family: var(--font-heading); font-size: 0.95rem; }
        .note-meta strong { display: block; margin-bottom: 0.2rem; font-weight: 500;}
        .note-meta span { font-size: 0.8rem; font-style: normal; color: rgba(0,0,0,0.5); font-family: var(--font-body); }
        @media (prefers-color-scheme: dark) {
            .note-meta span { color: rgba(255,255,255,0.6); }
        }

        /* FOOTER */
        footer { background-color: var(--footer-bg); padding: 5rem 0; width: 100%; border-top: 1px solid var(--border-color);}
        .footer-container {
            max-width: 1000px; margin: 0 auto; padding: 0 20px;
            display: flex; gap: 4rem; align-items: stretch; flex-wrap: wrap;
        }
        .footer-title-card {
            background: var(--card-bg); padding: 1.5rem 2rem; position: relative;
            transform: rotate(-3deg); box-shadow: var(--card-shadow);
            align-self: flex-start; margin-top: 2rem; width: 180px; text-align: center;
        }
        .footer-title-card h2 { font-size: 2rem; font-weight: 400; line-height: 1.1; }
        
        .market-stats {
            flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 3rem;
        }
        .stat-group h3 {
            font-size: 1.1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; 
        }
        .stat-item { margin-bottom: 1.2rem; }
        .stat-item span { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.4rem; color: var(--text-main); }
        .stat-bar-container {
            height: 14px; width: 100%; border: 1px solid var(--text-main); display: flex; background: rgba(0,0,0,0.05);
        }
        .stat-bar-fill { height: 100%; transition: width 1s ease; width: 0%; border-right: 1px solid var(--text-main);}
        .fill-blue { background: #b1d4ce; }
        .fill-yellow { background: #eadb8d; }
        @media (prefers-color-scheme: dark) {
            .stat-bar-container { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.3); }
            .stat-bar-fill { border-color: rgba(255,255,255,0.3); }
            .fill-blue { background: #4a7570; }
            .fill-yellow { background: #887f4c; }
        }

        /* MODAL - Share Page Merged */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ba5782;
            background-image:
                radial-gradient(circle at 10% 20%, #a2386a 0%, transparent 40%),
                radial-gradient(circle at 80% 30%, #a73c79 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, #d87754 0%, transparent 60%);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.4s;
            padding: 2rem; overflow-y: auto;
        }
        .modal-overlay::before {
            content: ''; position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backdrop-filter: blur(50px); z-index: 1;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content {
            background: #f7f7f5; padding: 4.5rem 4rem; position: relative; z-index: 2;
            width: 100%; max-width: 550px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transform: translateY(30px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 95vh; overflow-y: auto;
        }
        @media (prefers-color-scheme: dark) {
            .modal-content { background: #2a2825; }
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-title {
            font-family: var(--font-heading); font-size: 3.2rem; font-weight: 400;
            text-align: center; line-height: 1.1; margin-bottom: 1rem; color: #111;
        }
        .modal-subtitle {
            text-align: center; font-size: 1.1rem; line-height: 1.3;
            color: #111; margin-bottom: 2.5rem; font-weight: 400;
        }
        @media (prefers-color-scheme: dark) {
            .modal-title, .modal-subtitle { color: #e8e8e8; }
        }

        .btn-close-share {
            position: absolute; top: 1.5rem; right: 1.5rem;
            background: none; border: none; font-size: 2rem; cursor: pointer;
            color: #888; line-height: 1; transition: color 0.2s; z-index: 3;
        }
        .btn-close-share:hover { color: #111; }
        @media (prefers-color-scheme: dark) {
            .btn-close-share { color: #aaa; }
            .btn-close-share:hover { color: #fff; }
        }

        .share-form .form-group { margin-bottom: 1.5rem; }
        .share-form .form-group label {
            display: block; font-size: 0.8rem; color: #111;
            margin-bottom: 0.3rem; font-weight: 400;
        }
        .share-form .label-light { color: #888; }
        @media (prefers-color-scheme: dark) {
            .share-form .form-group label { color: #ccc; }
        }

        .share-form input[type="text"],
        .share-form input[type="number"],
        .share-form textarea,
        .share-form select {
            width: 100%; padding: 0.6rem; border: 1px solid #111;
            background: transparent; font-family: var(--font-body);
            font-size: 0.95rem; color: #111; outline: none;
        }
        .share-form input:focus, .share-form textarea:focus, .share-form select:focus {
            outline: 2px solid #111;
        }
        @media (prefers-color-scheme: dark) {
            .share-form input[type="text"],
            .share-form input[type="number"],
            .share-form textarea,
            .share-form select { border-color: #555; color: #e8e8e8; }
            .share-form input:focus, .share-form textarea:focus, .share-form select:focus { outline-color: #aaa; }
            .share-form select option { background: #2a2825; color: #e8e8e8; }
        }
        .share-form textarea { resize: vertical; height: 140px; }

        .years-row {
            display: flex; align-items: center; gap: 2rem; margin-bottom: 2.5rem;
        }
        .years-input-group { display: flex; flex-direction: column; width: 100px; }

        .checkbox-group {
            display: flex; align-items: center; gap: 0.6rem; margin-top: 1.2rem;
        }
        .share-form input[type="checkbox"] {
            appearance: none; width: 14px; height: 14px;
            border: 1px solid #111; background: transparent;
            cursor: pointer; position: relative; padding: 0;
        }
        .share-form input[type="checkbox"]:checked::after {
            content: ''; position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            background: #111;
        }
        @media (prefers-color-scheme: dark) {
            .share-form input[type="checkbox"] { border-color: #888; }
            .share-form input[type="checkbox"]:checked::after { background: #e8e8e8; }
        }
        .checkbox-group label { margin-bottom: 0; font-size: 0.85rem; cursor: pointer; }

        .btn-submit-share {
            background-color: #111; color: #fff; border: none;
            padding: 0.8rem 1.2rem; font-family: var(--font-body);
            font-weight: 400; font-size: 0.85rem; letter-spacing: 0.5px;
            cursor: pointer; transition: opacity 0.2s;
        }
        .btn-submit-share:hover { opacity: 0.9; }
        @media (prefers-color-scheme: dark) {
            .btn-submit-share { background: #e8e8e8; color: #111; }
        }

        /* Emotion Selects */
        .emotion-selects { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.3rem; }
        .emotion-selects label {
            display: inline-flex; align-items: center; gap: 0.3rem;
            background: transparent; padding: 0.35rem 0.7rem;
            border: 1px solid #111; cursor: pointer; user-select: none; font-size: 0.8rem;
        }
        .emotion-selects label:has(input:checked) { background: #111; color: #fff; border-color: #111; }
        .emotion-selects input { display: none; }
        @media (prefers-color-scheme: dark) {
            .emotion-selects label { border-color: #555; color: #ccc; }
            .emotion-selects label:has(input:checked) { background: #e8e8e8; color: #111; border-color: #e8e8e8; }
        }

        @media (max-width: 600px) {
            .modal-content { padding: 3rem 2rem; }
            .modal-title { font-size: 2.4rem; }
            .years-row { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }

        /* Empty State */
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.5; }

        /* Responsive Adjustments */
        .mobile-share-wrapper { display: none; text-align: center; margin-top: 3rem; }
        @media (max-width: 768px) {
            .btn-share.desktop-share { display: none; }
            .mobile-share-wrapper { display: block; }

            .top-bar { margin-bottom: 1.5rem; justify-content: center; }
            .search-bar { width: 100%; border-bottom: 2px solid var(--text-main); }
            
            .footer-container { flex-direction: column; align-items: center; text-align: center; }
            .market-stats { width: 100%; }
            .stat-group h3 { text-align: left; }
            .footer-title-card { align-self: center; transform: rotate(0); margin-bottom: 2rem; }
        }
    </style>
</head>
<body>



    <header class="hero-section">
        <div class="hero-content">
            <div class="tape"></div>
            <h1>Explore Career Sentiments</h1>
            <p>Browse honest, anonymous feedback from<br>professionals across industries.</p>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="container">
            <div class="top-bar">
                <input type="text" id="searchInput" class="search-bar" placeholder="SEARCH CAREERS">
                <button id="btnShareExperience" class="btn-share desktop-share">SHARE EXPERIENCE</button>
            </div>

            <div class="tabs-header">
                <div class="tabs-container" id="tabsContainer">
                    <!-- Tabs rendered by JS -->
                </div>
                <button class="tabs-arrow" id="tabsArrow" aria-label="Scroll tabs right">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>

            <main id="mainContent" class="tab-content">
                <!-- Content rendered by JS -->
            </main>

            <div class="mobile-share-wrapper">
                <button id="btnShareExperienceMobile" class="btn-share mobile-share">SHARE EXPERIENCE</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div class="footer-title-card">
                <div class="note-tape" style="position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 45px; height: 25px; background: #222;"></div>
                <h2>Market<br>Insights</h2>
            </div>
            
            <div class="market-stats">
                <div class="stat-group">
                    <h3>Most Rewarding Careers</h3>
                    <div id="rewardingCareersList"></div>
                </div>
                <div class="stat-group">
                    <h3>Most Stressful Careers</h3>
                    <div id="stressfulCareersList"></div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Overlay Modal - Share Page -->
    <div class="modal-overlay" id="shareModal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <button class="btn-close-share" id="closeModal" aria-label="Close modal">&times;</button>
            <h1 class="modal-title">Share Your<br>Career Truth</h1>
            <p class="modal-subtitle">Anonymously. Honestly.<br>No names attached.</p>

            <form id="shareForm" class="share-form">
                <div class="form-group">
                    <label for="formCareer">Select Career</label>
                    <select id="formCareer" required>
                        <option value="" disabled selected>Select a career...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>How does it feel? <span class="label-light">Select up to 3</span></label>
                    <div id="formEmotions" class="emotion-selects"></div>
                </div>

                <div class="form-group">
                    <label for="formQuote">Your Experience</label>
                    <textarea id="formQuote" required></textarea>
                </div>

                <div class="years-row">
                    <div class="years-input-group">
                        <label for="formYears">Years in role</label>
                        <input type="number" id="formYears" min="0" required>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="formCurrentRole">
                        <label for="formCurrentRole">I currently work here</label>
                    </div>
                </div>

                <input type="hidden" id="formColor" value="yellow">
                <input type="hidden" id="formTag" value="">

                <button type="submit" class="btn-submit-share">SUBMIT ANONYMOUSLY</button>
            </form>
        </div>
    </div>

    <script>
        /* SVGs for icons */
        const icons = {
            "Architect": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4M9 7h6M9 11h6"/></svg>`,
            "Chef": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/></svg>`,
            "Software Engineer": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
            "Graphic Designer": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`,
            "Journalist": `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`
        };

        /* Default Data */
        const availableEmotions = ['fulfilled', 'stressful', 'rewarding', 'creative', 'exhausting', 'flexible', 'solitary', 'challenging', 'innovative', 'lucrative', 'underpaid', 'fun', 'demanding', 'impactful', 'underappreciated'];
        
        function computeWordCloud(experiences) {
            const counts = {};
            experiences.forEach(exp => {
                if(exp.emotions) {
                    exp.emotions.forEach(em => {
                        counts[em] = (counts[em] || 0) + 1;
                    });
                }
            });
            const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 10);
            const max = sorted.length > 0 ? sorted[0][1] : 1;
            return sorted.map(([text, count]) => {
                let size = "sm";
                if(count / max >= 0.8) size = "lg";
                else if (count / max >= 0.4) size = "md";
                return { text, size };
            });
        }

        const defaultData = {
            "Architect": {
                submissions: 7, sentimentPercentage: 77, sentimentText: "Mostly Positive",
                words: [],
                experiences: [
                    { color: "blue", quote: "Working as a Architect has its ups and downs. The day-to-day varies significantly.", years: 10, role: "Former role", tag: "#Architecture", emotions: ["exhausting", "creative"] },
                    { color: "yellow", quote: "The industry is changing rapidly which keeps things interesting.", years: 4, role: "Current role", tag: "#Growth #Advocate", emotions: ["flexible"] },
                    { color: "pink", quote: "Working as a Architect has its ups and downs. The day-to-day varies significantly.", years: 10, role: "Former role", tag: "#Architecture", emotions: ["creative"] }
                ]
            },
            "Chef": {
                submissions: 12, sentimentPercentage: 65, sentimentText: "Mixed",
                words: [],
                experiences: [
                    { color: "yellow", quote: "Long hours but creating a perfect dish makes it all worth it.", years: 8, role: "Current role", tag: "#CulinaryArts", emotions: ["stressful", "rewarding"] }
                ]
            },
            "Software Engineer": {
                submissions: 154, sentimentPercentage: 85, sentimentText: "Highly Positive",
                words: [],
                experiences: [
                    { color: "blue", quote: "Great pay and benefits, but you have to constantly keep learning.", years: 5, role: "Current role", tag: "#TechLife", emotions: ["lucrative", "innovative"] },
                    { color: "pink", quote: "Burnout is real if you don't manage your time properly.", years: 3, role: "Current role", tag: "#MentalHealth", emotions: ["challenging", "solitary"] }
                ]
            },
            "Graphic Designer": {
                submissions: 42, sentimentPercentage: 60, sentimentText: "Moderate",
                words: [],
                experiences: [
                    { color: "yellow", quote: "Clients often don't know what they want until they see what they don't want.", years: 6, role: "Current role", tag: "#DesignLife", emotions: ["creative", "fun"] }
                ]
            },
            "Journalist": {
                submissions: 28, sentimentPercentage: 55, sentimentText: "Mixed",
                words: [],
                experiences: [
                    { color: "blue", quote: "Telling important stories keeps me going, despite industry struggles.", years: 12, role: "Current role", tag: "#Journalism", emotions: ["impactful", "demanding"] }
                ]
            }
        };

        const marketInsightsData = {
            rewarding: [
                { name: "Attorney", score: 80, colorClass: "fill-blue" },
                { name: "Data Scientist", score: 85, colorClass: "fill-blue" },
                { name: "Pilot", score: 75, colorClass: "fill-blue" },
                { name: "Social Worker", score: 60, colorClass: "fill-blue" },
                { name: "Pharmacist", score: 65, colorClass: "fill-blue" }
            ],
            stressful: [
                { name: "Nurse", score: 90, colorClass: "fill-yellow" },
                { name: "Marketing Manager", score: 80, colorClass: "fill-yellow" },
                { name: "Journalist", score: 70, colorClass: "fill-yellow" },
                { name: "Architect", score: 65, colorClass: "fill-yellow" },
                { name: "Attorney", score: 85, colorClass: "fill-yellow" }
            ]
        };

        // State
        let appData = JSON.parse(localStorage.getItem('careerEchosData')) || defaultData;
        let activeTab = "Architect";
        let isInfiniteScrolling = false;

        // DOM Elements
        const tabsContainer = document.getElementById('tabsContainer');
        const mainContent = document.getElementById('mainContent');
        const searchInput = document.getElementById('searchInput');
        const tabsArrow = document.getElementById('tabsArrow');
        
        const modal = document.getElementById('shareModal');
        const btnShare = document.getElementById('btnShareExperience');
        const btnShareMobile = document.getElementById('btnShareExperienceMobile');
        const btnClose = document.getElementById('closeModal');
        const form = document.getElementById('shareForm');
        const formCareer = document.getElementById('formCareer');

        // Search Logic
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            renderTabs(val);
        });

        // Tabs Infinity Logic
        tabsContainer.addEventListener('scroll', () => {
            if (isInfiniteScrolling) return;
            const scrollLeft = tabsContainer.scrollLeft;
            const scrollWidth = tabsContainer.scrollWidth;
            const containerWidth = tabsContainer.offsetWidth;

            // Simple Jump logic for infinite effect
            if (scrollLeft <= 5) {
                // Jump to middle
                isInfiniteScrolling = true;
                tabsContainer.classList.add('no-smooth');
                tabsContainer.scrollLeft = scrollWidth / 3;
                setTimeout(() => {
                    tabsContainer.classList.remove('no-smooth');
                    isInfiniteScrolling = false;
                }, 50);
            } else if (scrollLeft + containerWidth >= scrollWidth - 5) {
                // Jump to middle
                isInfiniteScrolling = true;
                tabsContainer.classList.add('no-smooth');
                tabsContainer.scrollLeft = scrollWidth / 3;
                setTimeout(() => {
                    tabsContainer.classList.remove('no-smooth');
                    isInfiniteScrolling = false;
                }, 50);
            }
        });

        tabsArrow.addEventListener('click', () => {
            tabsContainer.scrollBy({ left: 200, behavior: 'smooth' });
        });

        // Init
        function init() {
            Object.keys(appData).forEach(key => {
                if(appData[key].experiences) {
                    appData[key].words = computeWordCloud(appData[key].experiences);
                    if(appData[key].words.length === 0) {
                        appData[key].words = [{text: key, size: 'md'}];
                    }
                }
            });

            renderTabs();
            renderContent();
            renderMarketInsights();
            populateFormOptions();
            
            // Trigger reflow for animations
            setTimeout(() => {
                const fillBars = document.querySelectorAll('.sentiment-fill, .stat-bar-fill');
                fillBars.forEach(bar => {
                    const target = bar.getAttribute('data-target-width');
                    if(target) bar.style.width = target + '%';
                });
            }, 100);
        }

        function renderTabs(filter = "") {
            tabsContainer.innerHTML = "";
            let keys = Object.keys(appData);
            if(filter) keys = keys.filter(k => k.toLowerCase().includes(filter));
            
            if(keys.length === 0) {
                tabsContainer.innerHTML = `<div style="padding: 1rem; color: var(--text-muted);">No careers found</div>`;
                return;
            }

            // Triple the keys for infinite effect
            const tripleKeys = [...keys, ...keys, ...keys];
            
            tripleKeys.forEach((key, index) => {
                const btn = document.createElement('button');
                btn.className = `tab ${key === activeTab ? 'active' : ''}`;
                btn.innerHTML = `${icons[key] || icons["Journalist"]} ${key}`;
                btn.onclick = () => {
                    activeTab = key;
                    document.querySelectorAll('.tab').forEach(t => {
                        const tKey = t.innerText.trim();
                        t.classList.toggle('active', tKey === key);
                    });
                    renderContent();
                    // Scroll to clicked tab? Optional.
                };
                tabsContainer.appendChild(btn);
            });

            // Set initial position to middle set
            setTimeout(() => {
                tabsContainer.classList.add('no-smooth');
                tabsContainer.scrollLeft = tabsContainer.scrollWidth / 3;
                tabsContainer.classList.remove('no-smooth');
            }, 0);
        }

        function renderContent() {
            const data = appData[activeTab];
            if (!data) {
                mainContent.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <h2>No data available</h2>
                        <p>No experiences found for this career yet.</p>
                    </div>
                `;
                return;
            }

            mainContent.innerHTML = `
                <div class="content-header">
                    <h2>${activeTab}</h2>
                    <p>${data.submissions} anonymous submissions</p>
                </div>
                
                <div class="sentiment-bar-container">
                    <div class="sentiment-bar">
                        <div class="sentiment-fill" style="width: 0%" data-target-width="${data.sentimentPercentage}"></div>
                    </div>
                    <div class="sentiment-labels">
                        <span>${data.sentimentText}</span>
                        <strong>${data.sentimentPercentage}% Positive Sentiment</strong>
                    </div>
                </div>

                <div class="word-cloud">
                    <h3>Emotional Landscape</h3>
                    <div class="words">
                        ${data.words.map(w => `<span class="word-${w.size}">${w.text}</span>`).join('')}
                    </div>
                </div>

                <div class="experiences">
                    <h3>Recent Experiences</h3>
                    <div class="notes-container">
                        ${data.experiences.length > 0 ? 
                            data.experiences.map((exp, i) => `
                            <div class="note note-${exp.color}" style="animation: dropIn ${0.3 + (i * 0.1)}s ease forwards;">
                                <div class="note-tape"></div>
                                <p>"${exp.quote}"</p>
                                <div class="note-meta">
                                    <strong>${exp.years} years experience</strong>
                                    <strong>${exp.role}</strong>
                                    ${exp.tag ? `<span>${exp.tag}</span>` : ''}
                                </div>
                            </div>
                        `).join('')
                        : '<p style="color: var(--text-muted); font-style: italic;">No experiences shared yet. Be the first!</p>' }
                    </div>
                </div>
            `;

            // Trigger animation
            setTimeout(() => {
                const bar = mainContent.querySelector('.sentiment-fill');
                if(bar) bar.style.width = bar.getAttribute('data-target-width') + '%';
            }, 50);
        }

        function renderMarketInsights() {
            const renderStats = (list, containerId) => {
                const container = document.getElementById(containerId);
                container.innerHTML = list.map(item => `
                    <div class="stat-item">
                        <span>${item.name}</span>
                        <div class="stat-bar-container">
                            <div class="stat-bar-fill ${item.colorClass}" style="width: 0%" data-target-width="${item.score}"></div>
                        </div>
                    </div>
                `).join('');
            };
            
            renderStats(marketInsightsData.rewarding, 'rewardingCareersList');
            renderStats(marketInsightsData.stressful, 'stressfulCareersList');
        }

        // Form Options
        function populateFormOptions() {
            Object.keys(appData).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = key;
                formCareer.appendChild(opt);
            });
        }

        // Modal Logic - Open share form on same page
        const openModal = () => {
            modal.classList.add('active');
            renderFormEmotions();
        };
        btnShare.addEventListener('click', openModal);
        btnShareMobile.addEventListener('click', openModal);
        
        function renderFormEmotions() {
            const container = document.getElementById('formEmotions');
            container.innerHTML = availableEmotions.map(em => `
                <label>
                    <input type="checkbox" name="emotions" value="${em}">
                    ${em}
                </label>
            `).join('');
            
            const checkboxes = container.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.addEventListener('change', () => {
                    const checkedCount = container.querySelectorAll('input[type="checkbox"]:checked').length;
                    if(checkedCount > 3) cb.checked = false;
                });
            });
        }
        
        btnClose.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => {
            if(e.target === modal) modal.classList.remove('active');
        });

        // Form Submit
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const career = document.getElementById('formCareer').value;
            const quote = document.getElementById('formQuote').value;
            const years = document.getElementById('formYears').value;
            const isCurrentRole = document.getElementById('formCurrentRole').checked;
            const role = isCurrentRole ? 'Current role' : 'Former role';
            const color = document.getElementById('formColor').value;
            let tag = document.getElementById('formTag').value;

            const checkedEmotions = Array.from(document.querySelectorAll('#formEmotions input[name="emotions"]:checked')).map(cb => cb.value);

            if(!tag) {
                tag = '#' + career.replace(/\s+/g, '');
            } else if (!tag.startsWith('#')) {
                tag = '#' + tag;
            }

            const newExp = { color, quote, years: parseInt(years), role, tag, emotions: checkedEmotions };

            // Update appData
            if(!appData[career]) {
                appData[career] = { 
                    submissions: 0, sentimentPercentage: 50, sentimentText: "Neutral", 
                    words: [], experiences: [] 
                };
            }
            
            appData[career].experiences.unshift(newExp);
            appData[career].submissions += 1;
            appData[career].words = computeWordCloud(appData[career].experiences);
            
            // Save to localStorage
            localStorage.setItem('careerEchosData', JSON.stringify(appData));
            
            // Close modal & reset form
            modal.classList.remove('active');
            form.reset();

            // Re-render
            if (activeTab === career) {
                renderContent();
            } else {
                activeTab = career;
                renderTabs();
                renderContent();
            }
        });

        // Initialize App
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
